name: Lingo.dev Localization CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  localize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Extract Strings & Push to Lingo.dev
        run: npx lingo.dev push
        env:
          LINGODOTDEV_API_KEY: ${{ secrets.LINGODOTDEV_API_KEY }}

      - name: Pull Latest Translations
        run: npx lingo.dev pull
        env:
          LINGODOTDEV_API_KEY: ${{ secrets.LINGODOTDEV_API_KEY }}

      - name: Verify Build
        run: npm run build
